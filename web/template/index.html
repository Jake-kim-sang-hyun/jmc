<!DOCTYPE html>
<html lang="ko">
    <head>
        <title>JMC Wiki</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>
    <body>
        <h1>JMC Wiki</h1>
        <div class="toolbar">
            <div class="actions">
                <button id="btn-recommend" type="button">추천</button>
                <button id="btn-add" type="button">추가</button>
                <button id="btn-save" type="button">저장</button>
            </div>
            <div class="name-filter-row">
                <input id="name-filter" class="name-filter" type="text" placeholder="이름으로 검색...">
                <input id="menu-filter" class="name-filter" type="text" placeholder="메뉴 이름으로 검색...">
                <select id="visited-filter" class="visited-filter">
                    <option value="all">전체</option>
                    <option value="true">방문</option>
                    <option value="false">미방문</option>
                </select>
                <input id="cooldown-filter" class="cooldown-filter" type="number" min="0" placeholder="쿨타임(일)...">
                <input id="min-price-filter" class="price-filter" type="number" min="0" placeholder="최소 가격...">
                <input id="max-price-filter" class="price-filter" type="number" min="0" placeholder="최대 가격...">
                <input id="min-rating-filter" class="rating-filter" type="number" min="0" max="5" step="0.5" placeholder="최소 평점...">
                <input id="max-rating-filter" class="rating-filter" type="number" min="0" max="5" step="0.5" placeholder="최대 평점...">
            </div>
            <div id="open-days-filter" class="open-days-filter"></div>
            <div id="tag-filters" class="tag-filters"></div>
            <div id="saved-filters"></div>
        </div>
        <table>
            <thead>
                <tr>
                    <th class="col-visited">방문</th>
                    <th class="col-name">이름</th>
                    <th class="col-menu">메뉴/가격</th>
                    <th class="col-rating">평점</th>
                    <th class="col-category">카테고리</th>
                    <th class="col-location">위치</th>
                    <th class="col-open-days">영업일</th>
                    <th class="col-kakao">카카오 지도</th>
                    <th>소감</th>
                    <th class="col-last-visited">마지막 방문</th>
                    <th class="col-delete">삭제</th>
                </tr>
            </thead>
            <tbody id="table-body">
                {{range .Restaurants}}
                <tr class="restaurant-row" data-status="" data-original-name="{{.Name}}">
                    <td class="col-visited" data-field="visited"><input type="checkbox" class="visited-check"{{if .Visited}} checked{{end}}></td>
                    <td contenteditable="true" data-field="name">{{.Name}}</td>
                    <td class="col-menu"><button type="button" class="btn-add-menu">+</button></td>
                    <td data-field="rating">
                        <select class="rating-select" data-value="{{.Rating}}">
                            <option value="0">-</option>
                            <option value="0.5">(반)</option>
                            <option value="1">⭐</option>
                            <option value="1.5">⭐(반)</option>
                            <option value="2">⭐⭐</option>
                            <option value="2.5">⭐⭐(반)</option>
                            <option value="3">⭐⭐⭐</option>
                            <option value="3.5">⭐⭐⭐(반)</option>
                            <option value="4">⭐⭐⭐⭐</option>
                            <option value="4.5">⭐⭐⭐⭐(반)</option>
                            <option value="5">🌟🌟🌟🌟🌟</option>
                        </select>
                    </td>
                    <td data-field="categories" class="tag-cell"><div class="tag-container">{{range .Categories}}<span class="tag" data-tag="{{.}}">{{.}} <button type="button" class="tag-remove" aria-label="태그 삭제">×</button></span>{{end}}<input type="text" class="tag-input" placeholder="태그 입력..." maxlength="50"></div></td>
                    <td data-field="locations" class="tag-cell"><div class="tag-container">{{range .Locations}}<span class="tag" data-tag="{{.}}">{{.}} <button type="button" class="tag-remove" aria-label="태그 삭제">×</button></span>{{end}}<input type="text" class="tag-input" placeholder="위치 입력..." maxlength="50"></div></td>
                    {{$od := .OpenDays}}<td class="col-open-days" data-field="open_days"><div class="open-days"><label><input type="checkbox" class="open-day-check" data-day="0"{{if openDay $od 0}} checked{{end}}>월</label><label><input type="checkbox" class="open-day-check" data-day="1"{{if openDay $od 1}} checked{{end}}>화</label><label><input type="checkbox" class="open-day-check" data-day="2"{{if openDay $od 2}} checked{{end}}>수</label><label><input type="checkbox" class="open-day-check" data-day="3"{{if openDay $od 3}} checked{{end}}>목</label><label><input type="checkbox" class="open-day-check" data-day="4"{{if openDay $od 4}} checked{{end}}>금</label><label><input type="checkbox" class="open-day-check" data-day="5"{{if openDay $od 5}} checked{{end}}>토</label><label><input type="checkbox" class="open-day-check" data-day="6"{{if openDay $od 6}} checked{{end}}>일</label></div></td>
                    <td contenteditable="true" data-field="kakao_url">{{.KakaoURL}}</td>
                    <td contenteditable="true" data-field="description">{{nl2br .Description}}</td>
                    <td class="col-last-visited" data-field="last_visited_at"><input type="date" class="last-visited-input"{{if .LastVisitedAt}} value="{{.LastVisitedAt}}"{{end}}></td>
                    <td class="col-delete"><input type="checkbox" class="row-check"></td>
                </tr>
                {{range .Menus}}
                <tr class="menu-row" data-status="">
                    <td class="col-visited" data-field="menu-visited"><input type="checkbox" class="menu-visited-check"{{if .Visited}} checked{{end}}></td>
                    <td contenteditable="true" data-field="menu-name">{{.Name}}</td>
                    <td contenteditable="true" data-field="menu-price">{{.Price}}</td>
                    <td data-field="menu-rating">
                        <select class="rating-select" data-value="{{.Rating}}">
                            <option value="0">-</option>
                            <option value="0.5">(반)</option>
                            <option value="1">⭐</option>
                            <option value="1.5">⭐(반)</option>
                            <option value="2">⭐⭐</option>
                            <option value="2.5">⭐⭐(반)</option>
                            <option value="3">⭐⭐⭐</option>
                            <option value="3.5">⭐⭐⭐(반)</option>
                            <option value="4">⭐⭐⭐⭐</option>
                            <option value="4.5">⭐⭐⭐⭐(반)</option>
                            <option value="5">🌟🌟🌟🌟🌟</option>
                        </select>
                    </td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td contenteditable="true" data-field="menu-description">{{nl2br .Description}}</td>
                    <td class="col-last-visited" data-field="menu-last-visited-at"><input type="date" class="last-visited-input"{{if .LastVisitedAt}} value="{{.LastVisitedAt}}"{{end}}></td>
                    <td class="col-delete"><input type="checkbox" class="menu-check"></td>
                </tr>
                {{end}}
                {{end}}
            </tbody>
        </table>
        <script type="application/json" id="initial-search">{{json .Search}}</script>
        <script src="/static/main.js"></script>
    </body>
</html>
